name: wedding_countdown
description: "ספירה לאחור רומנטית עד החתונה - אפליקציית אנדרואיד עם Widget למסך הבית."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.3
  home_widget: ^0.6.0
  path_provider: ^2.1.4
  path: ^1.9.0
  intl: ^0.20.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# הגדרת אייקון האפליקציה (התמונה שלכם).
# יצירת האייקונים: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/background.jpg
